# Mock Profile Configuration
# This profile enables mock mode for testing without external APIs

# Application Configuration
spring.application.name=pr-analyzer-mock
server.port=8080

# Mock mode - no real API keys needed
github.token=mock-github-token
openai.api.key=mock-openai-key

# Logging Configuration
logging.level.com.codeecho=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Swagger UI / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
