# Application Configuration
spring.application.name=pr-analyzer
server.port=8080

# GitHub API Configuration
github.token=${GITHUB_TOKEN:your-github-token-here}
github.api.base-url=https://api.github.com

# AI Provider Configuration
# Options: openai, github, copilot, azure
ai.provider=${AI_PROVIDER:openai}

# OpenAI API Configuration
openai.api.key=${OPENAI_API_KEY:your-openai-api-key-here}
openai.api.base-url=https://api.openai.com/v1

# Azure OpenAI Configuration (optional)
azure.openai.key=${AZURE_OPENAI_KEY:}
azure.openai.endpoint=${AZURE_OPENAI_ENDPOINT:}

# Logging Configuration
logging.level.com.codeecho=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# HTTP Client Configuration
spring.webflux.timeout=30s


# Swagger UI / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.defaultModelsExpandDepth=-1
springdoc.swagger-ui.docExpansion=none
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.showExtensions=false
springdoc.swagger-ui.showCommonExtensions=false
springdoc.swagger-ui.configUrl=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.show-actuator=false
springdoc.swagger-ui.supportedSubmitMethods=get,post
springdoc.swagger-ui.persistAuthorization=false

# Mock Mode Configuration
# To enable mock mode, set: spring.profiles.active=mock
# This allows testing without GitHub/OpenAI API keys
